<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Lubis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;
  --surface:#13171f;
  --surface2:#191e28;
  --surface3:#1f2535;
  --border:#252c3a;
  --border2:#2e3848;
  --gold:#e8a020;
  --gold2:#f5b340;
  --gold-dim:rgba(232,160,32,0.12);
  --gold-border:rgba(232,160,32,0.28);
  --green:#22c55e;
  --blue:#4f8ef7;
  --text:#e2e8f4;
  --text2:#8896ae;
  --text3:#525f75;
  --red:#e05252;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(12,15,20,0.96);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:48px;backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff}
.brand-icon{color:var(--gold);font-size:18px}
.brand b{color:var(--gold)}
.brand span{color:var(--text2);font-weight:400}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text3);letter-spacing:2px;
  background:var(--surface2);padding:4px 10px;border-radius:5px;border:1px solid var(--border)}

.layout{display:flex;height:calc(100vh - 48px)}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:11px 13px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-hdr-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.btn-deselect{padding:3px 8px;background:transparent;border:1px solid var(--border2);border-radius:4px;
  color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .12s;display:none}
.btn-deselect.show{display:block}
.btn-deselect:hover{border-color:var(--red);color:var(--red)}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.sb-search input:focus{border-color:var(--gold)}
.sb-search input::placeholder{color:var(--text3)}
.pasaran-list{flex:1;overflow-y:auto;padding:5px}
.pasaran-item{padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);
  transition:all .12s;display:flex;align-items:center;gap:8px;margin-bottom:1px;user-select:none}
.pasaran-item:hover{background:var(--surface2);color:var(--text)}
.pasaran-item.active{background:var(--gold-dim);color:var(--gold);font-weight:600}
.pasaran-item .dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .12s}
.pasaran-item.active .dot{background:var(--gold)}
.no-results{padding:20px 12px;text-align:center;font-size:11px;color:var(--text3)}

/* CONTENT */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.empty-wrap{flex:1;display:flex;align-items:center;justify-content:center}
.empty-box{text-align:center;padding:40px 24px}
.empty-icon{font-size:36px;opacity:.18;margin-bottom:14px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.7}

.topbar{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:10px}
.topbar-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.pasaran-badge{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);
  padding:4px 12px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.5px}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 18px;flex-shrink:0}
.tab{padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);background:transparent;border:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

.cards-wrap{padding:14px 18px;flex:1}
.tab-pane{display:none}
.tab-pane.active{display:block}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:9px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 14px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.card-name{font-size:13px;font-weight:700;color:var(--text)}
.card-badge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:3px;background:var(--surface3);color:var(--text3);text-transform:uppercase}
.card-info{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.5}
.card-info b{color:var(--text2)}
.input-row{display:flex;gap:6px;align-items:stretch}
.inp{flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,background .15s;min-width:0}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--text3);font-size:12px}
.inp::-webkit-outer-spin-button,.inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.inp[type=number]{-moz-appearance:textfield}
.btn-calc{padding:8px 14px;background:var(--gold);border:none;border-radius:5px;color:#000;font-size:11px;
  font-weight:700;letter-spacing:.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;white-space:nowrap}
.btn-calc:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-calc:active{transform:translateY(0)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,7,14,.82);
  backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  width:100%;max-width:430px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.03);
  animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;background:var(--surface2)}
.m-left{}
.m-pasaran-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.m-pasaran-val{display:inline-block;background:var(--gold-dim);border:1px solid var(--gold-border);
  color:var(--gold);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px}
.m-type{font-size:17px;font-weight:700;color:var(--text);margin-top:7px}
.btn-close{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;
  width:28px;height:28px;min-width:28px;color:var(--text3);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .12s}
.btn-close:hover{color:var(--text);border-color:rgba(255,255,255,.15)}

.modal-body{padding:15px 18px 18px}

/* PK sentence box */
.pk-box{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);
  border-radius:6px;padding:12px 14px;margin-bottom:13px;font-size:13px;color:var(--text2);line-height:1.7}
.pk-box .pk-name{color:#fff;font-weight:700}
.pk-box .pk-bet{color:var(--blue);font-weight:700}
.pk-box .pk-menang{color:var(--green);font-weight:700}
.pk-box .pk-mult{color:var(--text3);font-size:12px}
.pk-box .pk-bosku{color:var(--gold);font-weight:700;font-style:italic}

.result-rows{display:grid;gap:5px;margin-bottom:11px}
.result-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);border-radius:6px;padding:10px 13px;border:1px solid var(--border)}
.rr-label{font-size:11px;color:var(--text3);font-weight:500}
.rr-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.rr-val.pay{color:var(--blue)}
.rr-val.win{color:var(--green)}

.copy-row{display:flex;align-items:center;gap:10px;background:var(--surface3);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;margin-bottom:11px}
.copy-txt{flex:1;font-size:11px;color:var(--text3);line-height:1.5;min-width:0;word-break:break-word}
.btn-copy{flex-shrink:0;padding:5px 10px;background:transparent;border:1px solid var(--border2);border-radius:4px;
  color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.5px;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-copy:hover{border-color:var(--gold);color:var(--gold)}
.btn-copy.copied{border-color:var(--green);color:var(--green)}

.btn-tutup{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.btn-tutup:hover{border-color:var(--border);color:var(--text)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:640px){
  .sidebar{width:170px;min-width:170px}
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="brand">
    <span class="brand-icon">♛</span>
    <b>Calculator</b>&nbsp;<span>Lubis</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sb-hdr">
      <span class="sb-hdr-label">Pasaran</span>
      <button class="btn-deselect" id="btnDeselect" onclick="deselectPasaran()">✕ Hapus</button>
    </div>
    <div class="sb-search">
      <input type="text" id="searchInput" placeholder="Cari pasaran..." oninput="filterPasaran()">
    </div>
    <div class="pasaran-list" id="pasaranList"></div>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="m-left">
        <div class="m-pasaran-lbl">Pasaran</div>
        <div class="m-pasaran-val" id="mPasaran">—</div>
        <div class="m-type" id="mType">—</div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="pk-box" id="pkBox"></div>
      <div class="result-rows">
        <div class="result-row">
          <span class="rr-label">Nominal Taruhan</span>
          <span class="rr-val" id="mBet">—</span>
        </div>
        <div class="result-row" id="rowBayar">
          <span class="rr-label">Bayar (setelah diskon)</span>
          <span class="rr-val pay" id="mBayar">—</span>
        </div>
        <div class="result-row">
          <span class="rr-label">Hadiah (jika tembus)</span>
          <span class="rr-val win" id="mMenang">—</span>
        </div>
      </div>
      <div class="copy-row">
        <span class="copy-txt" id="mCopyText"></span>
        <button class="btn-copy" id="btnCopy" onclick="salin()">SALIN</button>
      </div>
      <button class="btn-tutup" onclick="closeModal()">TUTUP</button>
    </div>
  </div>
</div>

<script>
(function tick(){
  const p=n=>String(n).padStart(2,'0'),n=new Date();
  document.getElementById('clock').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  setTimeout(tick,1000);
})();

const ALL_PASARAN=[
  "BANGKOK","BANGKOK 0130","BANGKOK 0930",
  "BRUNEI","BRUNEI02","BRUNEI14","BRUNEI21",
  "BULLSEYE","CALIFORNIA",
  "CAROLINA DAY","CAROLINA EVE","CAROLINA EVENING",
  "CHELSEA","CHELSEA11","CHELSEA15","CHELSEA19","CHELSEA21",
  "FLORIDA EVE","FLORIDA EVENING","FLORIDA MIDDAY",
  "HOKI DRAW","HONGKONG","HONGKONG LOTTO",
  "HUAHIN","HUAHIN0100","HUAHIN1630","HUAHIN2100",
  "KENTUCKY EVENING","KENTUCKY MIDDAY",
  "KING KONG4D MALAM","KING KONG4D SORE","KINGKONG",
  "MAGNUM4D","NEVADA",
  "NEW YORK EVENING","NEW YORK MIDDAY",
  "NORTH CAROLINA DAY",
  "OREGON 03","OREGON 06","OREGON 09","OREGON 12",
  "PCSO",
  "POIPET12","POIPET15","POIPET19","POIPET22",
  "SINGAPORE","SYDNEY","SYDNEY LOTTO",
  "TOTO CAMBODIA","TOTO CAMBODIA LIVE",
  "TOTO MACAU 4D","TOTO MACAU 5D",
  "TOTO MACAU MALAM 1","TOTO MACAU MALAM 2","TOTO MACAU MALAM 3",
  "TOTO MACAU PAGI","TOTO MACAU SIANG","TOTO MACAU SORE",
  "TOTOMALI","TOTOMALI1530","TOTOMALI2030","TOTOMALI2330"
];

const TABS={
  diskon:{label:'Diskon',cards:[
    {id:'d5d',name:'Diskon 5D',diskon:38,hadiah:50000},
    {id:'d4d',name:'Diskon 4D',diskon:20,hadiah:7000},
    {id:'d3d',name:'Diskon 3D',diskon:20,hadiah:750},
    {id:'d2d',name:'Diskon 2D',diskon:20,hadiah:75},
  ]},
  betfull:{label:'Bet Full',cards:[
    {id:'bf5d',name:'Bet Full 5D',diskon:0,hadiah:88000},
    {id:'bf4d',name:'Bet Full 4D',diskon:0,hadiah:10000},
    {id:'bf3d',name:'Bet Full 3D',diskon:0,hadiah:1000},
    {id:'bf2d',name:'Bet Full 2D',diskon:0,hadiah:100},
  ]},
  tepat:{label:'Tepat & BB',cards:[
    {id:'t5d',name:'5D Tepat',diskon:0,hadiah:50000},
    {id:'bb5d',name:'5D BB',diskon:0,hadiah:350},
    {id:'t4d',name:'4D Tepat',diskon:0,hadiah:5000},
    {id:'bb4d',name:'4D BB',diskon:0,hadiah:180},
    {id:'t3d',name:'3D Tepat',diskon:0,hadiah:500},
    {id:'bb3d',name:'3D BB',diskon:0,hadiah:75},
    {id:'t2d',name:'2D Tepat',diskon:0,hadiah:80},
    {id:'bb2d',name:'2D BB',diskon:0,hadiah:15},
  ]},
  lainnya:{label:'Lainnya',cards:[
    {id:'cb',name:'Colok Bebas',diskon:6,hadiah:0.9},
    {id:'cb2d2',name:'Colok Bebas 2D (2)',diskon:10,hadiah:4},
    {id:'cb2d3',name:'Colok Bebas 2D (3)',diskon:10,hadiah:6},
    {id:'cb2d4',name:'Colok Bebas 2D (4)',diskon:10,hadiah:20},
    {id:'cb2d5',name:'Colok Bebas 2D (5)',diskon:10,hadiah:200},
    {id:'cb4d4',name:'Colok Bebas 4D (4)',diskon:10,hadiah:50},
    {id:'cb4d5',name:'Colok Bebas 4D (5)',diskon:10,hadiah:200},
    {id:'cn3',name:'Colok Naga (3)',diskon:10,hadiah:12},
    {id:'cn4',name:'Colok Naga (4)',diskon:10,hadiah:30},
    {id:'cn5',name:'Colok Naga (5)',diskon:10,hadiah:125},
    {id:'cj',name:'Colok Jitu',diskon:6,hadiah:8},
    {id:'tt',name:'Tengah Tepi',diskon:2,hadiah:null,kei:-2.2},
    {id:'dgk',name:'Dasar Genap – Kecil',diskon:2,hadiah:null,kei:10},
    {id:'dgb',name:'Dasar Ganjil – Besar',diskon:2,hadiah:null,kei:-25},
    {id:'5050',name:'50 – 50',diskon:2,hadiah:null,kei:-2.2},
    {id:'shio',name:'Shio',diskon:5,hadiah:9.5},
    {id:'kom',name:'Kombinasi',diskon:8,hadiah:2.7},
  ]}
};

let activePasaran=null,activeTab='diskon',copyText='';
const fmt=n=>Math.round(n).toLocaleString('id-ID');

function renderSidebar(filter=''){
  const list=document.getElementById('pasaranList');
  list.innerHTML='';
  const f=filter.trim().toLowerCase();
  const filtered=ALL_PASARAN.filter(p=>p.toLowerCase().includes(f));
  if(!filtered.length){list.innerHTML='<div class="no-results">Tidak ditemukan</div>';return;}
  filtered.forEach(p=>{
    const el=document.createElement('div');
    el.className='pasaran-item'+(activePasaran===p?' active':'');
    el.innerHTML=`<span class="dot"></span>${p}`;
    el.onclick=()=>activePasaran===p?deselectPasaran():selectPasaran(p);
    list.appendChild(el);
  });
}

function filterPasaran(){renderSidebar(document.getElementById('searchInput').value)}

function selectPasaran(p){
  activePasaran=p;
  document.getElementById('btnDeselect').classList.add('show');
  renderSidebar(document.getElementById('searchInput').value);
  renderMain();
}

function deselectPasaran(){
  activePasaran=null;
  document.getElementById('btnDeselect').classList.remove('show');
  renderSidebar(document.getElementById('searchInput').value);
  renderMain();
}

function renderMain(){
  const content=document.getElementById('mainContent');
  if(!activePasaran){
    content.innerHTML=`<div class="empty-wrap"><div class="empty-box">
      <div class="empty-icon">♛</div>
      <div class="empty-title">Belum ada pasaran dipilih</div>
      <div class="empty-sub">Silakan pilih pasaran dari daftar di sebelah kiri<br>untuk mulai menghitung hadiah</div>
    </div></div>`;
    return;
  }

  const tabsHTML=Object.entries(TABS).map(([key,t])=>
    `<button class="tab${activeTab===key?' active':''}" onclick="switchTab('${key}')">${t.label}</button>`
  ).join('');

  let panesHTML='';
  Object.entries(TABS).forEach(([key,t])=>{
    const cards=t.cards.map(c=>{
      const info=c.hadiah!==null
        ?`Diskon <b>${c.diskon}%</b>&nbsp;·&nbsp;Hadiah <b>×${c.hadiah}</b>`
        :`Diskon <b>${c.diskon}%</b>&nbsp;·&nbsp;Kei <b>${c.kei>0?'+':''}${c.kei}%</b>`;
      const badge=c.diskon>0?`D${c.diskon}%`:(c.hadiah!==null?`×${c.hadiah}`:`KEI`);
      return `<div class="card">
        <div class="card-head">
          <span class="card-name">${c.name}</span>
          <span class="card-badge">${badge}</span>
        </div>
        <div class="card-info">${info}</div>
        <div class="input-row">
          <input class="inp" type="number" id="inp-${c.id}" placeholder="Masukkan nominal..." min="1"
            onkeydown="if(event.key==='Enter')hitung('${c.id}','${key}')">
          <button class="btn-calc" onclick="hitung('${c.id}','${key}')">Hitung</button>
        </div>
      </div>`;
    }).join('');
    panesHTML+=`<div class="tab-pane${activeTab===key?' active':''}" id="pane-${key}"><div class="cards-grid">${cards}</div></div>`;
  });

  content.innerHTML=`
    <div class="topbar">
      <span class="topbar-label">Pasaran</span>
      <span class="pasaran-badge">${activePasaran}</span>
    </div>
    <div class="tabs">${tabsHTML}</div>
    <div class="cards-wrap">${panesHTML}</div>`;
}

function switchTab(key){activeTab=key;renderMain()}

function hitung(id,tabKey){
  if(!activePasaran)return;
  const card=TABS[tabKey].cards.find(c=>c.id===id);
  if(!card)return;
  const inp=document.getElementById('inp-'+id);
  const bet=parseFloat(inp.value);
  if(!bet||bet<=0){
    inp.focus();
    inp.style.borderColor='var(--red)';
    inp.style.background='rgba(224,82,82,0.07)';
    setTimeout(()=>{inp.style.borderColor='';inp.style.background='';},800);
    return;
  }

  const bayar=bet*(1-card.diskon/100);
  const menang=card.hadiah!==null ? bet*card.hadiah : bayar*(1+card.kei/100);

  // PK sentence
  let pkHTML,plainCopy;
  if(card.hadiah!==null){
    pkHTML=`Jika Anda memasang <span class="pk-name">${card.name}</span> dengan bettingan <span class="pk-bet">Rp ${fmt(bet)}</span>, maka hadiah yang Anda dapatkan adalah <span class="pk-menang">Rp ${fmt(menang)}</span> <span class="pk-mult">(betingan&nbsp;:&nbsp;×${card.hadiah})</span> <span class="pk-bosku">ya bosku</span>`;
    plainCopy=`Jika Anda memasang ${card.name} dengan bettingan Rp ${fmt(bet)}, maka hadiah yang Anda dapatkan adalah Rp ${fmt(menang)} (betingan : x${card.hadiah}) ya bosku`;
  } else {
    pkHTML=`Jika Anda memasang <span class="pk-name">${card.name}</span> dengan bettingan <span class="pk-bet">Rp ${fmt(bet)}</span>, hasil setelah kei <span class="pk-mult">(${card.kei>0?'+':''}${card.kei}%)</span> adalah <span class="pk-menang">Rp ${fmt(menang)}</span> <span class="pk-bosku">ya bosku</span>`;
    plainCopy=`Jika Anda memasang ${card.name} dengan bettingan Rp ${fmt(bet)}, hasil setelah kei (${card.kei>0?'+':''}${card.kei}%) adalah Rp ${fmt(menang)} ya bosku`;
  }
  copyText=plainCopy;

  document.getElementById('mPasaran').textContent=activePasaran;
  document.getElementById('mType').textContent=card.name;
  document.getElementById('pkBox').innerHTML=pkHTML;
  document.getElementById('mBet').textContent='Rp '+fmt(bet);
  document.getElementById('mBayar').textContent='Rp '+fmt(bayar);
  document.getElementById('mMenang').textContent='Rp '+fmt(menang);
  document.getElementById('mCopyText').textContent=copyText;
  document.getElementById('rowBayar').style.display=card.diskon>0?'':'none';
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){document.getElementById('overlay').classList.remove('show')}
function closeOutside(e){if(e.target===document.getElementById('overlay'))closeModal()}
function salin(){
  if(!copyText)return;
  const btn=document.getElementById('btnCopy');
  navigator.clipboard.writeText(copyText).then(()=>{
    btn.textContent='✓ DISALIN';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='SALIN';btn.classList.remove('copied');},2000);
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

renderSidebar();
renderMain();
</script>
</body>
</html>
